{% extends 'base.html' %}

{% block title %}Admin Signup - EV Stock Manager{% endblock %}

{% block extra_head %}
<style>
body {
    align-items: center;
    justify-content: center;
}
.login-box {
    max-width: 400px;
    width: 100%;
}
.login-box h1 {
    text-align: center;
    margin-bottom: 1.5rem;
}
.form-group {
    margin-bottom: 1rem;
}
.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
}
.form-group input {
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    font-family: inherit;
}
.form-group input:focus {
    outline: none;
    border-color: var(--primary);
}
.login-btn {
    width: 100%;
    padding: 0.75rem;
    margin-top: 1rem;
}
.error {
    color: var(--danger);
    text-align: center;
    margin-bottom: 1rem;
}
</style>
{% endblock %}

{% block content %}
<div class="card login-box">
    <h1>Admin Setup</h1>
    {% if messages %}
        {% for message in messages %}
            <div class="error" style="color: {% if message.tags == 'success' %}var(--success){% else %}var(--danger){% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <form method="post" action="{% url 'secret_admin_signup' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Admin Username</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div class="form-group">
            <label for="password">Admin Password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit" class="btn login-btn">Create Admin User</button>
    </form>
</div>
{% endblock %}
